_target_: limo.src.dataset.local_datamodule.LocalLimoDataModule

# Path to the root dataset folder (must contain a grandtour/ subdirectory
# with mission folders already built by dataset_builder).
dataset_folder: ${paths.data_dir}/dataset_builder

# CSV mapping mission timestamps to train/val/test splits.
# Points at the 3 example missions built by build_example.yaml.
missions_csv: ${paths.root_dir}/limo/configs/dataset/missions_split_example.csv

# Dataset type: "tel" (teleoperation), "geo" (geometric), or "aug" (both).
dataset_type: "aug"

batch_size: 16
num_workers: 8
pin_memory: False

shuffle_train: True
shuffle_val: False
shuffle_test: False

with_side_cams: False

image_size: [308, 476]
